<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Calculator</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
        }

        body { background-color: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; font-family: 'Segoe UI', sans-serif; margin: 0; box-sizing: border-box; }
        .card { max-width: 550px; width: 100%; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .header p { margin: 5px 0 0; font-size: 13px; color: var(--accent-blue); }
        
        .main-container { padding: 20px; }
        .main-title { font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 20px; display: block; border-left: 4px solid var(--pds-orange); padding-left: 10px; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; }
        .input-col input { width: 100%; padding: 8px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box; text-align: center; }

        .calc-btn { width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; background: var(--success-green); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-section-title { color: var(--pds-orange); font-size: 13px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 5px; margin: 15px 0 10px; }
        .res-line { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 3px; }
        .res-line b { color: #fff; }
        .error-text { color: var(--error-red) !important; font-size: 12px; }
        
        .footer-tools { padding: 15px; background: #fafafa; text-align: center; border-top: 1px solid #eee; }
        .report-btn { background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Calculator</h1>
        <p>Measurements and Calibration tool</p>
    </div>

    <div class="main-container">
        <span class="main-title">Enter Input Values</span>
        
        <div class="input-row">
            <div class="input-col"><label>Stick Pin X</label><input type="number" id="x_st" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_st" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_st" step="0.001" placeholder="Val"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>Bucket Pin X</label><input type="number" id="x_bu" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_bu" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_bu" step="0.001" placeholder="Val"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>S3 Pin X</label><input type="number" id="x_s3" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_s3" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_s3" step="0.001" placeholder="Val"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>S4 Pin X</label><input type="number" id="x_s4" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_s4" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_s4" step="0.001" placeholder="Val"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>S5 Pin X</label><input type="number" id="x_s5" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_s5" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_s5" step="0.001" placeholder="Val"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>T1 Teeth X</label><input type="number" id="x_t1" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_t1" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_t1" step="0.001" placeholder="Val"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>T5 Pin X</label><input type="number" id="x_t5" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Y</label><input type="number" id="y_t5" step="0.001" placeholder="Val"></div>
            <div class="input-col"><label>Z</label><input type="number" id="z_t5" step="0.001" placeholder="Val"></div>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Calculate Results</button>

    <div id="resultsArea" class="results-area">
        <div class="res-section-title">CALIBRATION VALUES</div>
        <div class="res-line"><span>S1:</span> <b id="out-s1"></b></div>
        <div class="res-line"><span>S2:</span> <b id="out-s2"></b></div>
        <div class="res-line"><span>S3:</span> <b id="out-s3"></b></div>
        <div class="res-line"><span>S4:</span> <b id="out-s4"></b></div>
        <div class="res-line"><span>S5:</span> <b id="out-s5"></b></div>
        <div class="res-line"><span>T5:</span> <b id="out-ts"></b></div>
        <div class="res-line"><span>T1:</span> <b id="out-t1"></b></div>
        <div class="res-line"><span>T6:</span> <b id="out-t6" style="color:var(--pds-orange)"></b></div>
        
        <button class="report-btn" style="width:100%; margin-top:20px;" onclick="downloadReport()">Download TXT Report</button>
    </div>

    <div class="footer-tools">
        <small>How to install: Chrome Menu > Install App</small>
    </div>
</div>

<script>
    function dist3D(p1, p2) {
        if (!p1 || !p2) return null;
        return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2) + Math.pow(p2.z - p1.z, 2));
    }

    function getP(id_p) {
        const x = document.getElementById('x_'+id_p).value;
        const y = document.getElementById('y_'+id_p).value;
        const z = document.getElementById('z_'+id_p).value;
        if (x === "" || y === "" || z === "") return null;
        return { x: parseFloat(x), y: parseFloat(y), z: parseFloat(z) };
    }

    function formatRes(val, unit = " m") {
        if (val === null || isNaN(val)) return '<span class="error-text">no input values</span>';
        return val.toFixed(3) + unit;
    }

    function calculate() {
        const ST = getP('st'), BU = getP('bu'), S3 = getP('s3'), 
              S4 = getP('s4'), S5 = getP('s5'), T1 = getP('t1'), T5 = getP('t5');

        const s1 = (ST && BU) ? dist3D(ST, BU) : null;

        let s3_val = null, s2_val = null;
        if (s1 && S3) {
            const v_st_bu = { x: BU.x - ST.x, y: BU.y - ST.y, z: BU.z - ST.z };
            const v_st_s3 = { x: S3.x - ST.x, y: S3.y - ST.y, z: S3.z - ST.z };
            const cp = {
                x: v_st_s3.y * v_st_bu.z - v_st_s3.z * v_st_bu.y,
                y: v_st_s3.z * v_st_bu.x - v_st_s3.x * v_st_bu.z,
                z: v_st_s3.x * v_st_bu.y - v_st_s3.y * v_st_bu.x
            };
            s3_val = Math.sqrt(cp.x**2 + cp.y**2 + cp.z**2) / s1;
            const v_bu_st = { x: ST.x - BU.x, y: ST.y - BU.y, z: ST.z - BU.z };
            const v_bu_s3 = { x: S3.x - BU.x, y: S3.y - BU.y, z: S3.z - BU.z };
            const dot = (v_bu_s3.x * v_bu_st.x + v_bu_s3.y * v_bu_st.y + v_bu_s3.z * v_bu_st.z);
            s2_val = dot / s1; 
        }

        let t6_val = null;
        if (T1 && T5 && S5) {
            const vT1 = { x: T1.x - T5.x, y: T1.y - T5.y, z: T1.z - T5.z };
            const vS5 = { x: S5.x - T5.x, y: S5.y - T5.y, z: S5.z - T5.z };
            const m1 = Math.sqrt(vT1.x**2 + vT1.y**2 + vT1.z**2), m2 = Math.sqrt(vS5.x**2 + vS5.y**2 + vS5.z**2);
            if (m1 > 0 && m2 > 0) {
                const cosT = (vT1.x * vS5.x + vT1.y * vS5.y + vT1.z * vS5.z) / (m1 * m2);
                t6_val = Math.acos(Math.max(-1, Math.min(1, cosT))) * (180 / Math.PI);
            }
        }

        document.getElementById('out-s1').innerHTML = formatRes(s1);
        document.getElementById('out-s2').innerHTML = formatRes(s2_val);
        document.getElementById('out-s3').innerHTML = formatRes(s3_val);
        document.getElementById('out-s4').innerHTML = formatRes(dist3D(S3, S4));
        document.getElementById('out-s5').innerHTML = formatRes(dist3D(S4, S5));
        document.getElementById('out-ts').innerHTML = formatRes(dist3D(T5, S5));
        document.getElementById('out-t1').innerHTML = formatRes(dist3D(T1, T5));
        document.getElementById('out-t6').innerHTML = formatRes(t6_val, "°");
        document.getElementById('resultsArea').style.display = "block";
    }

    function downloadReport() {
        let content = "EXCAVATOR CALIBRATION REPORT\nGenerated: " + new Date().toLocaleString() + "\n------------------------------------------\nRESULTS:\n";
        ["s1", "s2", "s3", "s4", "s5", "ts", "t1", "t6"].forEach(id => {
            const label = document.getElementById('out-'+id).previousElementSibling?.innerText || id.toUpperCase();
            content += label + ": " + document.getElementById('out-'+id).innerText + "\n";
        });
        const blob = new Blob([content], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Excavator_Report.txt';
        link.click();
    }
</script>
</body>
</html>
